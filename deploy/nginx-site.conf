# Production nginx site for Rural Connect Hub.
# Deploy script substitutes __APP_ROOT__ with EC2_APP_PATH (e.g. /home/ubuntu/rural-connect-hub).
# SSL paths assume certbot was run for balbirs.com.

server {
    listen 80;
    server_name balbirs.com www.balbirs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name balbirs.com www.balbirs.com;

    ssl_certificate /etc/letsencrypt/live/balbirs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/balbirs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # Serve built frontend assets directly (avoids proxy truncation on large JS/CSS).
    root __APP_ROOT__/dist/public;

    location /assets/ {
        alias __APP_ROOT__/dist/public/assets/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location = /favicon.png {
        try_files $uri =404;
        expires 7d;
    }

    location = /manifest.json {
        try_files $uri =404;
        expires 1h;
    }

    # API + SPA fallback via Node/PM2
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;
    }
}
