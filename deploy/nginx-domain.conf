# Copy to EC2 after domain DNS is ready:
#   sudo nano /etc/nginx/sites-available/rural-connect-hub
# Replace YOUR_DOMAIN.com with your real domain (e.g. balbirs.com)

# Use deploy/nginx-site.conf + deploy/apply-nginx.sh on the server.
# This file is a minimal HTTP-only template for first-time setup before SSL.

server {
    listen 80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    client_max_body_size 50M;
    root /home/ubuntu/rural-connect-hub/dist/public;

    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
