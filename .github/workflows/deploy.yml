name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install, build, and pack release
        run: |
          npm ci
          NODE_ENV=production npm run build
          # Do not bundle node_modules — install on EC2 to keep upload small.
          tar -czf release.tar.gz dist package.json package-lock.json ecosystem.config.cjs deploy/
          ls -lh release.tar.gz

      - name: Prepare EC2 for deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -e
            APP_PATH="${{ secrets.EC2_APP_PATH }}"
            mkdir -p "$APP_PATH/deploy"
            cd "$APP_PATH"
            echo "==> Disk before deploy:"
            df -h "$APP_PATH" || df -h
            rm -f release.tar.gz
            rm -rf node_modules dist
            echo "==> EC2 ready for upload"

      - name: Upload release to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: release.tar.gz
          target: ${{ secrets.EC2_APP_PATH }}
          overwrite: true
          timeout: 120s

      - name: Extract on EC2, install deps, and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -e
            APP_PATH="${{ secrets.EC2_APP_PATH }}"
            cd "$APP_PATH"
            tar -xzf release.tar.gz
            rm -f release.tar.gz
            npm ci --omit=dev
            chmod +x deploy/apply-nginx.sh
            bash deploy/apply-nginx.sh "$APP_PATH" || echo "Nginx apply skipped (check SSL paths on server)"
            if pm2 describe rural-connect-hub >/dev/null 2>&1; then
              pm2 restart rural-connect-hub
            else
              pm2 start ecosystem.config.cjs
            fi
            pm2 save
            echo "==> Disk after deploy:"
            df -h "$APP_PATH" || df -h
