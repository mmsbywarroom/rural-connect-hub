name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install, build, and pack release
        run: |
          npm ci
          NODE_ENV=production npm run build
          npm prune --omit=dev
          tar -czf release.tar.gz dist node_modules package.json package-lock.json ecosystem.config.cjs deploy/
          ls -lh release.tar.gz

      - name: Prepare EC2 for deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -e
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            APP_PATH="${{ secrets.EC2_APP_PATH }}"
            mkdir -p "$APP_PATH/deploy"
            cd "$APP_PATH"
            echo "==> Disk before deploy:"
            df -h /
            rm -f release.tar.gz
            rm -rf ~/.npm/_cacache node_modules/.cache 2>/dev/null || true
            AVAIL_KB="$(df / | tail -1 | awk '{print $4}')"
            echo "==> Available disk KB: $AVAIL_KB"
            if [ "$AVAIL_KB" -lt 524288 ]; then
              echo "==> Low disk: removing old dist and node_modules"
              rm -rf node_modules dist
            fi
            echo "==> EC2 ready for upload"

      - name: Upload release to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: release.tar.gz
          target: ${{ secrets.EC2_APP_PATH }}
          overwrite: true
          timeout: 300s

      - name: Extract on EC2 and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            APP_PATH="${{ secrets.EC2_APP_PATH }}"
            cd "$APP_PATH"
            if [ ! -f release.tar.gz ]; then
              echo "ERROR: release.tar.gz missing"
              ls -la
              exit 1
            fi
            rm -rf dist node_modules
            tar -xzf release.tar.gz
            rm -f release.tar.gz
            if [ ! -f dist/index.cjs ]; then
              echo "ERROR: dist/index.cjs missing after extract"
              exit 1
            fi
            sed -i 's/\r$//' deploy/apply-nginx.sh deploy/nginx-site.conf 2>/dev/null || true
            chmod +x deploy/apply-nginx.sh
            bash deploy/apply-nginx.sh "$APP_PATH" || echo "WARNING: nginx apply failed"
            PM2_BIN="$(command -v pm2 || true)"
            if [ -z "$PM2_BIN" ]; then
              echo "ERROR: pm2 not found"
              exit 1
            fi
            if "$PM2_BIN" describe rural-connect-hub >/dev/null 2>&1; then
              "$PM2_BIN" restart rural-connect-hub
            else
              "$PM2_BIN" start ecosystem.config.cjs
            fi
            "$PM2_BIN" save
            echo "==> Disk after deploy:"
            df -h /
