name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install, build, and pack release
        run: |
          npm ci
          NODE_ENV=production npm run build
          tar -czf release.tar.gz dist package.json package-lock.json ecosystem.config.cjs deploy/
          ls -lh release.tar.gz

      - name: Prepare EC2 for deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -e
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            APP_PATH="${{ secrets.EC2_APP_PATH }}"
            mkdir -p "$APP_PATH/deploy"
            cd "$APP_PATH"
            echo "==> Disk before deploy:"
            df -h /
            rm -f release.tar.gz
            rm -rf ~/.npm/_cacache node_modules/.cache 2>/dev/null || true
            USED="$(df / | tail -1 | awk '{print $5}' | tr -d '%')"
            if [ "$USED" -gt 85 ]; then
              echo "==> Disk ${USED}% full: removing node_modules to free space"
              rm -rf node_modules
            fi
            echo "==> node: $(command -v node || echo missing)"
            echo "==> npm: $(command -v npm || echo missing)"
            echo "==> pm2: $(command -v pm2 || echo missing)"
            echo "==> EC2 ready for upload"

      - name: Upload release to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: release.tar.gz
          target: ${{ secrets.EC2_APP_PATH }}
          overwrite: true
          timeout: 120s

      - name: Extract on EC2, install deps, and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            APP_PATH="${{ secrets.EC2_APP_PATH }}"
            cd "$APP_PATH"
            test -f release.tar.gz
            tar -xzf release.tar.gz
            rm -f release.tar.gz
            test -f dist/index.cjs
            sed -i 's/\r$//' deploy/apply-nginx.sh deploy/nginx-site.conf 2>/dev/null || true
            if [ ! -d node_modules/express ]; then
              echo "==> Installing production dependencies on EC2"
              rm -rf node_modules
              export NODE_OPTIONS="--max-old-space-size=768"
              /usr/bin/npm ci --omit=dev --no-audit --no-fund
            else
              echo "==> Reusing existing node_modules"
            fi
            test -d node_modules/express
            chmod +x deploy/apply-nginx.sh
            bash deploy/apply-nginx.sh "$APP_PATH" || echo "WARNING: nginx apply failed"
            if /usr/bin/pm2 describe rural-connect-hub >/dev/null 2>&1; then
              /usr/bin/pm2 restart rural-connect-hub
            else
              /usr/bin/pm2 start ecosystem.config.cjs
            fi
            /usr/bin/pm2 save
            echo "==> Deploy complete"
            df -h /
